<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pedido de Espelhos</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap');

  :root {
    --azul: #1b3a6b;
    --azul-medio: #254e94;
    --azul-claro: #dce8f8;
    --azul-hover: #142d55;
    --cinza-bg: #f0f4f9;
    --cinza-borda: #c9d8eb;
    --cinza-texto: #5a6f87;
    --branco: #ffffff;
    --destaque: #f0a500;
    --sombra: 0 2px 12px rgba(27,58,107,0.10);
    --radius: 13px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--cinza-bg);
    color: #1a2a3a;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: #fff;
    padding: 0 24px;
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(27,58,107,0.15);
    border-bottom: 3px solid var(--azul);
  }
  .logo img {
    height: 48px;
    width: auto;
    display: block;
  }

  .carrinho-btn {
    position: relative;
    background: var(--destaque);
    border: none;
    border-radius: 10px;
    color: #fff;
    padding: 9px 18px;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.2s;
    font-family: 'Inter', sans-serif;
  }
  .carrinho-btn:hover { background: #d4920a; }
  .badge {
    background: #fff;
    color: var(--azul);
    border-radius: 50%;
    width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem;
    font-weight: 700;
    position: absolute;
    top: -7px; right: -7px;
    border: 2px solid var(--destaque);
  }

  /* BUSCA */
  .busca-wrap {
    max-width: 680px;
    margin: 22px auto 0;
    padding: 0 16px;
  }
  .busca-rel { position: relative; }
  .busca-wrap input {
    width: 100%;
    padding: 12px 18px 12px 44px;
    border: 2px solid var(--cinza-borda);
    border-radius: var(--radius);
    font-size: 0.95rem;
    font-family: 'Inter', sans-serif;
    background: var(--branco);
    outline: none;
    transition: border-color 0.2s;
    color: #1a2a3a;
  }
  .busca-wrap input:focus { border-color: var(--azul-medio); box-shadow: 0 0 0 3px rgba(37,78,148,0.12); }
  .busca-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1rem;
    color: var(--cinza-texto);
    pointer-events: none;
  }

  /* MAIN */
  .main {
    max-width: 1060px;
    margin: 0 auto;
    padding: 24px 16px 110px;
  }

  .secao-titulo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--azul);
    margin-bottom: 18px;
    padding-bottom: 10px;
    border-bottom: 3px solid var(--azul-claro);
    display: flex;
    align-items: center;
    gap: 8px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .secao-titulo::before {
    content: '';
    display: inline-block;
    width: 5px; height: 20px;
    background: var(--azul);
    border-radius: 3px;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
    gap: 18px;
  }

  .card {
    background: var(--branco);
    border-radius: var(--radius);
    box-shadow: var(--sombra);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    border: 2px solid transparent;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(27,58,107,0.15); }
  .card.no-carrinho { border-color: var(--azul-medio); }

  .card-img-wrap {
    width: 100%;
    aspect-ratio: 3/4;
    overflow: hidden;
    background: #d8e4f0;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .card-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.3s;
  }
  .card:hover .card-img { transform: scale(1.04); }

  .card-body {
    padding: 12px 12px 6px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .card-cod {
    font-size: 0.68rem;
    color: var(--cinza-texto);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .card-nome {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--azul);
    line-height: 1.3;
  }
  .card-desc {
    font-size: 0.76rem;
    color: var(--cinza-texto);
    margin-top: 2px;
    line-height: 1.4;
  }
  .card-preco {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--azul);
    margin-top: 6px;
  }
  .card-preco-unit {
    font-size: 0.72rem;
    font-weight: 400;
    color: var(--cinza-texto);
    margin-left: 4px;
  }

  /* CONTROLE DE QTD */
  .card-footer {
    padding: 8px 12px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* Info de múltiplo — fica na descrição */
  .info-multiplo {
    font-size: 0.74rem;
    color: var(--azul-medio);
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 3px;
    margin-top: 2px;
  }

  .footer-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .qty-ctrl {
    display: flex;
    align-items: center;
    border: 2px solid var(--cinza-borda);
    border-radius: 8px;
    overflow: hidden;
    flex: 1;
    background: var(--cinza-bg);
  }
  .qty-ctrl button {
    background: none;
    border: none;
    width: 32px; height: 34px;
    font-size: 1.15rem;
    cursor: pointer;
    color: var(--azul);
    font-weight: 700;
    transition: background 0.15s;
  }
  .qty-ctrl button:hover { background: var(--azul-claro); }
  .qty-val {
    flex: 1;
    text-align: center;
    font-weight: 700;
    font-size: 0.9rem;
    color: #1a2a3a;
  }
  .btn-add {
    background: var(--azul);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 0.78rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
    font-family: 'Inter', sans-serif;
  }
  .btn-add:hover { background: var(--azul-hover); }
  .btn-add.adicionado { background: #1a8a4a; }

  /* CARRINHO LATERAL */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,25,50,0.55);
    z-index: 199;
  }
  .overlay.ativo { display: block; }

  .carrinho-panel {
    position: fixed;
    top: 0; right: -420px;
    width: 390px;
    max-width: 100vw;
    height: 100vh;
    background: var(--branco);
    z-index: 200;
    transition: right 0.28s cubic-bezier(.4,0,.2,1);
    display: flex;
    flex-direction: column;
    box-shadow: -4px 0 30px rgba(27,58,107,0.25);
  }
  .carrinho-panel.aberto { right: 0; }

  .carrinho-header {
    background: var(--azul);
    color: #fff;
    padding: 18px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .carrinho-header h2 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .fechar-btn {
    background: rgba(255,255,255,0.12);
    border: none;
    color: #fff;
    width: 34px; height: 34px;
    border-radius: 8px;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .fechar-btn:hover { background: rgba(255,255,255,0.22); }

  .carrinho-itens {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .carrinho-vazio {
    text-align: center;
    color: var(--cinza-texto);
    padding: 60px 20px;
  }
  .carrinho-vazio .icone { font-size: 3rem; margin-bottom: 14px; }
  .carrinho-vazio p { font-size: 0.92rem; line-height: 1.7; }

  .item-cart {
    background: var(--cinza-bg);
    border-radius: 10px;
    padding: 10px;
    display: flex;
    gap: 10px;
    align-items: center;
    border: 1px solid var(--cinza-borda);
  }
  .item-cart-img {
    width: 48px; height: 60px;
    border-radius: 6px;
    object-fit: cover;
    background: #c5d8ed;
    flex-shrink: 0;
  }
  .item-info { flex: 1; min-width: 0; }
  .item-info .cod { font-size: 0.66rem; color: var(--cinza-texto); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .item-info .nome { font-size: 0.85rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--azul); }
  .item-info .subtotal { font-size: 0.88rem; color: #1a7a40; font-weight: 700; margin-top: 2px; }
  .item-info .multiplo-info { font-size: 0.72rem; color: var(--cinza-texto); }

  .item-cart-ctrl {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .mini-btn {
    background: none;
    border: 2px solid var(--cinza-borda);
    border-radius: 6px;
    width: 28px; height: 28px;
    font-size: 1rem;
    cursor: pointer;
    font-weight: 700;
    color: var(--azul);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .mini-btn:hover { background: var(--azul-claro); border-color: var(--azul); }
  .mini-btn.remover { color: #c0392b; border-color: #fecaca; }
  .mini-btn.remover:hover { background: #fff5f5; border-color: #c0392b; }
  .item-qty-val { font-weight: 700; font-size: 0.88rem; color: #1a2a3a; }

  .carrinho-footer {
    padding: 16px;
    border-top: 2px solid var(--cinza-borda);
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: #f4f7fc;
  }
  .total-linha {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .total-label { font-size: 0.95rem; color: var(--cinza-texto); }
  .total-valor { font-size: 1.45rem; font-weight: 700; color: var(--azul); }

  .campo-nome {
    width: 100%;
    padding: 11px 14px;
    border: 2px solid var(--cinza-borda);
    border-radius: 10px;
    font-size: 0.93rem;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s;
    background: var(--branco);
    color: #1a2a3a;
  }
  .campo-nome:focus { border-color: var(--azul-medio); box-shadow: 0 0 0 3px rgba(37,78,148,0.12); }
  .campo-nome::placeholder { color: var(--cinza-texto); }

  .btn-zap {
    background: #25D366;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 0.97rem;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: background 0.2s, transform 0.1s;
    font-family: 'Inter', sans-serif;
  }
  .btn-zap:hover { background: #1da851; transform: translateY(-1px); }
  .btn-zap:active { transform: none; }

  /* BANNER */
  .banner-loja {
    background: linear-gradient(135deg, #1b3a6b 0%, #254e94 100%);
    padding: 28px 24px;
    display: flex;
    align-items: center;
    gap: 24px;
    justify-content: center;
  }
  .banner-logo {
    height: 80px;
    width: auto;
    flex-shrink: 0;
    background: #fff;
    border-radius: 10px;
    padding: 8px 14px;
  }
  .banner-texto {
    color: #fff;
    border-left: 3px solid var(--destaque);
    padding-left: 20px;
  }
  .banner-titulo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.5rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--destaque);
  }
  .banner-sub {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.8);
    margin-top: 4px;
    line-height: 1.5;
  }

  @media (max-width: 480px) {
    .banner-loja { flex-direction: column; text-align: center; gap: 14px; }
    .banner-texto { border-left: none; border-top: 3px solid var(--destaque); padding-left: 0; padding-top: 14px; }
    .banner-logo { height: 54px; }
  }

  .nenhum {
    text-align: center;
    color: var(--cinza-texto);
    padding: 48px 20px;
    font-size: 0.95rem;
  }

  @media (max-width: 580px) {
    .grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .carrinho-panel { width: 100vw; }
    .logo { font-size: 1.1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo"><img src="Logotipo%20-%20Andre%20Elias1.png" alt="André Elias Representações" /></div>
  <button class="carrinho-btn" onclick="abrirCarrinho()">
    🛒 Carrinho
    <span class="badge" id="badge">0</span>
  </button>
</header>

<div class="banner-loja">
  <img src="Logotipo%20-%20Andre%20Elias1.png" alt="André Elias Representações" class="banner-logo" />
  <div class="banner-texto">
    <div class="banner-titulo">Pedido de Espelhos</div>
    <div class="banner-sub">Selecione os produtos, adicione ao carrinho e envie seu pedido pelo WhatsApp</div>
  </div>
</div>

<div class="busca-wrap">
  <div class="busca-rel">
    <span class="busca-icon">🔍</span>
    <input type="text" id="busca" placeholder="Buscar por código ou medida (ex: 40x88)..." oninput="filtrar()" />
  </div>
</div>

<main class="main" id="main"></main>

<div class="overlay" id="overlay" onclick="fecharCarrinho()"></div>

<div class="carrinho-panel" id="painel">
  <div class="carrinho-header">
    <h2>🪞 Seu Pedido</h2>
    <button class="fechar-btn" onclick="fecharCarrinho()">✕</button>
  </div>
  <div class="carrinho-itens" id="itens-lista"></div>
  <div class="carrinho-footer">
    <div class="total-linha">
      <span class="total-label">Total do pedido</span>
      <span class="total-valor" id="total-val">R$ 0,00</span>
    </div>
    <input type="text" class="campo-nome" id="nome-cliente" placeholder="Seu nome completo" />
    <button class="btn-zap" onclick="enviarWhatsapp()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Enviar pedido no WhatsApp
    </button>
  </div>
</div>

<script>
// =============================================
// SEU NÚMERO DO WHATSAPP (DDI + DDD + número)
// =============================================
const SEU_WHATSAPP = "5513997324006";

// =============================================
// PRODUTOS
// multiplo: quantos por clique (1 = unitário)
// =============================================
const produtos = [
  { cod: "0058", nome: "Espelho 27×32 cm", desc: "Moldura preta, estilo moderno", preco: 20.24, img: "0058.png", multiplo: 10 },
  { cod: "1000", nome: "Espelho 33×43 cm", desc: "Moldura preta, acabamento fosco", preco: 28.93, img: "1000.png", multiplo: 10 },
  { cod: "5466", nome: "Espelho 39×63 cm", desc: "Moldura dourada trançada", preco: 39.35, img: "5466.png", multiplo: 10 },
  { cod: "9587", nome: "Espelho 40×88 cm", desc: "Moldura dourada trançada, corpo longo", preco: 62.00, img: "9587.png", multiplo: 5 },
  { cod: "9648", nome: "Espelho 44×123 cm", desc: "Moldura champagne trançada", preco: 86.79, img: "9648.png", multiplo: 1 },
  { cod: "9594", nome: "Espelho 50×150 cm", desc: "Moldura branca, espelho de chão", preco: 108.57, img: "9594.png", multiplo: 1 },
  { cod: "9150", nome: "Espelho 60×160 cm", desc: "Moldura prata trançada, espelho de chão", preco: 131.89, img: "9150.png", multiplo: 1 },
];

// =============================================
// CARRINHO
// =============================================
let carrinho = {};

function fmt(v) { return "R$ " + v.toFixed(2).replace(".", ","); }
function totalCarrinho() { return Object.values(carrinho).reduce((s, i) => s + i.preco * i.qty, 0); }
function qtdCarrinho() { return Object.values(carrinho).reduce((s, i) => s + i.qty, 0); }

function atualizarBadge() {
  const q = qtdCarrinho();
  const badge = document.getElementById("badge");
  if (badge) badge.textContent = q;
}

function addAoCarrinho(cod) {
  const p = produtos.find(x => x.cod === cod);
  if (!p) return;
  if (!carrinho[cod]) carrinho[cod] = { ...p, qty: 0 };
  carrinho[cod].qty += p.multiplo;
  atualizarBadge(); renderGrid(); renderCarrinho();
}

function removerDoCarrinho(cod) {
  if (!carrinho[cod]) return;
  const p = produtos.find(x => x.cod === cod);
  carrinho[cod].qty -= p.multiplo;
  if (carrinho[cod].qty <= 0) delete carrinho[cod];
  atualizarBadge(); renderGrid(); renderCarrinho();
}

// =============================================
// RENDER GRID
// =============================================
let filtroBusca = "";
function filtrar() { filtroBusca = document.getElementById("busca").value.toLowerCase(); renderGrid(); }

function infoMultiplo(m) {
  if (m === 1) return "";
  return `<div class="info-multiplo">📦 Venda em caixa com ${m} unidades</div>`;
}

function renderGrid() {
  try {
    const lista = filtroBusca
      ? produtos.filter(p => p.nome.toLowerCase().includes(filtroBusca) || p.cod.includes(filtroBusca) || p.desc.toLowerCase().includes(filtroBusca))
      : produtos;

    const main = document.getElementById("main");
    if (!main) return;
    
    if (lista.length === 0) {
      main.innerHTML = `<p class="nenhum">Nenhum espelho encontrado para "<strong>${filtroBusca}</strong>".</p>`;
      return;
    }

    let html = `<div class="secao-titulo">Espelhos com Moldura</div><div class="grid">`;
    for (const p of lista) {
      const noCarr = carrinho[p.cod];
      const qty = noCarr ? noCarr.qty : 0;
      const precoLabel = p.multiplo > 1
        ? `${fmt(p.preco)} <span class="card-preco-unit">/ un.</span>`
        : fmt(p.preco);

      html += `
      <div class="card ${noCarr ? 'no-carrinho' : ''}">
        <div class="card-img-wrap">
          <img src="${p.img}" alt="${p.nome}" class="card-img" loading="lazy" onerror="this.style.display='none'" />
        </div>
        <div class="card-body">
          <div class="card-cod">Cód. ${p.cod}</div>
          <div class="card-nome">${p.nome}</div>
          <div class="card-desc">${p.desc}</div>
          ${infoMultiplo(p.multiplo)}
          <div class="card-preco">${precoLabel}</div>
        </div>
        <div class="card-footer">
          <div class="footer-row">
            <div class="qty-ctrl">
              <button onclick="removerDoCarrinho('${p.cod}')">−</button>
              <span class="qty-val">${qty}</span>
              <button onclick="addAoCarrinho('${p.cod}')">+</button>
            </div>
            <button class="btn-add ${noCarr ? 'adicionado' : ''}" onclick="addAoCarrinho('${p.cod}')">
              ${noCarr ? '✓ Ok' : '+ Add'}
            </button>
          </div>
        </div>
      </div>`;
    }
    html += `</div>`;
    main.innerHTML = html;
  } catch (e) {
    console.error(e);
  }
}

// =============================================
// RENDER CARRINHO
// =============================================
function renderCarrinho() {
  const lista = document.getElementById("itens-lista");
  const total = document.getElementById("total-val");
  if (!lista || !total) return;
  
  const itens = Object.values(carrinho);
  total.textContent = fmt(totalCarrinho());

  if (itens.length === 0) {
    lista.innerHTML = `<div class="carrinho-vazio"><div class="icone">🪞</div><p>Seu carrinho está vazio.<br>Selecione os espelhos ao lado!</p></div>`;
    return;
  }

  let html = "";
  for (const it of itens) {
    const multiInfo = it.multiplo > 1 ? `<div class="multiplo-info">Múltiplo de ${it.multiplo}</div>` : "";
    html += `
    <div class="item-cart">
      <img src="${it.img}" alt="${it.nome}" class="item-cart-img" onerror="this.style.display='none'" />
      <div class="item-info">
        <div class="cod">Cód. ${it.cod}</div>
        <div class="nome">${it.nome}</div>
        ${multiInfo}
        <div class="subtotal">${fmt(it.preco * it.qty)}</div>
      </div>
      <div class="item-cart-ctrl">
        <button class="mini-btn" onclick="addAoCarrinho('${it.cod}')">+</button>
        <span class="item-qty-val">${it.qty}</span>
        <button class="mini-btn ${it.qty <= it.multiplo ? 'remover' : ''}" onclick="removerDoCarrinho('${it.cod}')">
          ${it.qty <= it.multiplo ? '🗑' : '−'}
        </button>
      </div>
    </div>`;
  }
  lista.innerHTML = html;
}

// =============================================
// PAINEL ABRIR/FECHAR
// =============================================
function abrirCarrinho() {
  document.getElementById("painel").classList.add("aberto");
  document.getElementById("overlay").classList.add("ativo");
  renderCarrinho();
}
function fecharCarrinho() {
  document.getElementById("painel").classList.remove("aberto");
  document.getElementById("overlay").classList.remove("ativo");
}

// =============================================
// WHATSAPP
// =============================================
function enviarWhatsapp() {
  const nome = document.getElementById("nome-cliente").value.trim();
  const itens = Object.values(carrinho);

  if (!nome) {
    const campo = document.getElementById("nome-cliente");
    campo.focus();
    campo.style.borderColor = "#c0392b";
    campo.placeholder = "⚠️ Informe seu nome antes de enviar";
    setTimeout(() => { campo.style.borderColor = ""; campo.placeholder = "Seu nome completo"; }, 2000);
    return;
  }
  if (itens.length === 0) return;

  let msg = `🪞 *PEDIDO DE ESPELHOS*\n`;
  msg += `👤 Cliente: *${nome}*\n`;
  msg += `📅 Data: ${new Date().toLocaleDateString("pt-BR")}\n\n`;
  msg += `*Itens:*\n`;
  msg += `━━━━━━━━━━━━━━━━━━━━\n`;

  for (const it of itens) {
    const multipInfo = it.multiplo > 1 ? ` (cx c/ ${it.multiplo})` : "";
    msg += `▪ [${it.cod}] ${it.nome}${multipInfo}\n`;
    msg += `  ${it.qty} un. × ${fmt(it.preco)} = *${fmt(it.preco * it.qty)}*\n`;
  }

  msg += `━━━━━━━━━━━━━━━━━━━━\n`;
  msg += `💰 *TOTAL: ${fmt(totalCarrinho())}*`;

  window.open(`https://wa.me/${SEU_WHATSAPP}?text=${encodeURIComponent(msg)}`, "_blank");
}
